name: distill
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  - pip
  - pip:
      # PyTorch 需单独安装（见 scripts/setup.ps1），此处仅列 ML 依赖
      - transformers>=4.46.0
      - datasets>=3.0.0
      - accelerate>=1.0.0
      - peft>=0.13.0
      - trl>=0.12.0
      - huggingface_hub>=0.26.0
      - safetensors
      - tokenizers
      - sentencepiece
      - protobuf
      - scipy
      - einops
      - tqdm
      - pandas
      - pyyaml

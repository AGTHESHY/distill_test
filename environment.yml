name: distill
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  - pip
  - pip:
      # PyTorch cu128 — RTX 5080 (Blackwell sm_120) 需要 CUDA 12.8 构建
      - --extra-index-url https://download.pytorch.org/whl/cu128
      - torch>=2.7.0
      - torchvision
      - torchaudio
      # Hugging Face 生态
      - transformers>=4.46.0
      - datasets>=3.0.0
      - accelerate>=1.0.0
      - peft>=0.13.0
      - trl>=0.12.0
      - huggingface_hub>=0.26.0
      - safetensors
      - tokenizers
      # 工具
      - sentencepiece
      - protobuf
      - scipy
      - einops
      - tqdm
      - pandas
      - pyyaml
